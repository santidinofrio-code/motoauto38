<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MotoAuto38 — Panel Admin</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <img src="../img/logo.png" alt="MotoAuto38" class="login-logo"
         onerror="this.outerHTML='<div style=\'font-family:var(--font-display);font-size:36px;font-weight:900;text-transform:uppercase;margin-bottom:2rem\'>Moto<span style=\'color:var(--yellow)\'>Auto</span>38</div>'">
    <div class="login-title">Panel Admin</div>
    <p class="login-sub">Ingresá con tu usuario y contraseña</p>

    <div class="login-error" id="login-error">Usuario o contraseña incorrectos.</div>

    <div class="login-form">
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input type="text" class="form-input" id="login-user" placeholder="admin" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-input" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-yellow" style="width:100%;justify-content:center;margin-top:0.5rem" id="login-btn">
        Ingresar
      </button>
    </div>
  </div>
</div>

<script src="../js/supabase.js"></script>
<script src="../js/app.js"></script>
<script>
  if (MA38.isLoggedIn()) window.location.href = 'index.html';

  function doLogin() {
    const user = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value;
    const err = document.getElementById('login-error');
    if (MA38.login(user, pass)) {
      window.location.href = 'index.html';
    } else {
      err.classList.add('show');
      document.getElementById('login-pass').value = '';
    }
  }

  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
